version = 0.1

[default]
[default.global.parameters]
stack_name = "prms-result-functions-testing-sync-cron"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
region = "us-east-1"
resolve_s3 = true
parameter_overrides = "Environment=testing ScheduleExpression=\"rate(15 minutes)\" ResultType=knowledge_product"
no_confirm_changeset = true
no_fail_on_empty_changeset = true
