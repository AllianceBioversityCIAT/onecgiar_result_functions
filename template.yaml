AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PRMS Sync Cron Job - Scheduled Lambda function for syncing results

Parameters:
  Environment:
    Type: String
    Default: testing
    AllowedValues:
      - testing
      - staging
      - production
    Description: Deployment environment
  
  ScheduleExpression:
    Type: String
    Default: rate(15 minutes)
    Description: "EventBridge schedule expression. Valid formats: rate(5 minutes), rate(1 hour), cron(0 12 * * ? *)"
    MinLength: 1
    AllowedPattern: "^(rate\\([0-9]+ (minute|minutes|hour|hours|day|days)\\)|cron\\([^)]{3,}\\))$"
    ConstraintDescription: "Use rate(x minutes|hours|days) or 6-field cron(0 12 * * ? *); do not wrap in quotes."
  
  ResultType:
    Type: String
    Default: knowledge_product
    Description: Result type to sync (e.g., knowledge_product, innovation_development, etc.)

Globals:
  Function:
    Timeout: 600
    MemorySize: 512
    Runtime: nodejs20.x
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        NODE_ENV: production

Resources:
  # Dead Letter Queue for failed invocations
  SyncCronDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${Environment}-sync-cron-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      ReceiveMessageWaitTimeSeconds: 0

  # IAM Role for Lambda
  SyncCronLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-sync-cron-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SyncCronLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${Environment}-sync-cron:*'
              # Secrets Manager (if needed for env vars)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/app/lambdas/prms/result-management/sync*'
              # SQS (for DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt SyncCronDLQ.Arn

  # CloudWatch Log Group
  SyncCronLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${Environment}-sync-cron'
      RetentionInDays: 30

  # Lambda Function
  SyncCronFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${Environment}-sync-cron'
      CodeUri: services/sync/
      Handler: dist-cron/handler.handler
      Role: !GetAtt SyncCronLambdaRole.Arn
      Runtime: nodejs20.x
      Timeout: 600
      MemorySize: 512
      ReservedConcurrentExecutions: 1
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt SyncCronDLQ.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          NODE_ENV: production
          RESULT_TYPE: !Ref ResultType
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Input: !Sub |
              {
                "job": "sync-cron",
                "env": "${Environment}",
                "result_type": "${ResultType}"
              }
            Enabled: true

Outputs:
  SyncCronFunctionArn:
    Description: ARN of the Sync Cron Lambda function
    Value: !GetAtt SyncCronFunction.Arn
    Export:
      Name: !Sub '${Environment}-sync-cron-arn'
  
  SyncCronFunctionName:
    Description: Name of the Sync Cron Lambda function
    Value: !Ref SyncCronFunction
    Export:
      Name: !Sub '${Environment}-sync-cron-name'
  
  SyncCronDLQUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref SyncCronDLQ
    Export:
      Name: !Sub '${Environment}-sync-cron-dlq-url'
  
  SyncCronSchedule:
    Description: EventBridge Schedule expression
    Value: !Ref ScheduleExpression
    Export:
      Name: !Sub '${Environment}-sync-cron-schedule'
