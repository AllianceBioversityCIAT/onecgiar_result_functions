AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: PRMS Sync Cron Job - Scheduled Lambda function for syncing results

Parameters:
  Environment:
    Type: String
    Default: testing
    AllowedValues: [testing, staging, production]
    Description: Deployment environment

  # IMPORTANT: This will NOT be overridden from Jenkins (avoid truncation issues)
  ScheduleExpression:
    Type: String
    Default: cron(0 23 * * ? *)
    MinLength: 1
    Description: "EventBridge schedule. Default once daily at 23:00 UTC (= 18:00 / 6pm Colombia, UTC-5, no DST). Examples: cron(0 23 * * ? *). Do not wrap in quotes."
    # Keep validation simple to avoid false negatives; AWS will enforce correctness anyway.
    AllowedPattern: "^(rate\\([0-9]+ (minute|minutes|hour|hours|day|days)\\)|cron\\(.+\\))$"
    ConstraintDescription: "Use rate(x minutes|hours|days) or 6-field cron(0 12 * * ? *); do not wrap in quotes."

  ResultType:
    Type: String
    Default: knowledge_product
    Description: Result type to sync (e.g., knowledge_product, innovation_development, etc.)

  CronJobLimit:
    Type: Number
    Default: 500
    Description: "Limit of items per page for cron job (1-500)"

  CronJobPortfolio:
    Type: String
    Default: P25
    Description: "Portfolio filter (e.g., P22, P25). Leave empty to not filter."

  CronJobPhaseYear:
    Type: Number
    Default: 0
    Description: "Phase year filter. Set to 0 to not filter by phase year."

  CronJobStatus:
    Type: String
    Default: ""
    Description: "Status filter (e.g., 'Pending Review'). Leave empty to not filter."

  CronJobLastUpdatedFrom:
    Type: String
    Default: ""
    Description: "Last updated date from (YYYY-MM-DD). Leave empty to not filter."

  CronJobLastUpdatedTo:
    Type: String
    Default: ""
    Description: "Last updated date to (YYYY-MM-DD). Leave empty to not filter."

  CronJobCreatedFrom:
    Type: String
    Default: ""
    Description: "Created date from (YYYY-MM-DD). Leave empty to not filter."

  CronJobCreatedTo:
    Type: String
    Default: ""
    Description: "Created date to (YYYY-MM-DD). Leave empty to not filter."

  SyncUtcDay:
    Type: String
    Default: ""
    Description: "Optional UTC calendar day YYYY-MM-DD for backfill window [day, day+1). Leave empty to use default current UTC day or LAST_UPDATED_* overrides."

Globals:
  Function:
    Timeout: 600
    MemorySize: 512
    Runtime: nodejs22.x
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        NODE_ENV: production

Resources:
  SyncCronDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-sync-cron-dlq"
      MessageRetentionPeriod: 1209600 # 14 days
      Tags:
        - Key: Project
          Value: PRMS
        - Key: Functionality
          Value: sync-result

  SyncCronLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-sync-cron"
      RetentionInDays: 30
      # Note: AWS::Logs::LogGroup does not support Tags property in CloudFormation

  SyncCronLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      # REMOVE RoleName to avoid collisions across stacks/accounts
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SyncCronLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:dev/app/lambdas/prms/result-management/sync*"
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt SyncCronDLQ.Arn
      Tags:
        - Key: Project
          Value: PRMS
        - Key: Functionality
          Value: sync-result

  SyncCronFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-sync-cron"
      CodeUri: services/sync/
      Handler: dist-cron/handler.handler
      Role: !GetAtt SyncCronLambdaRole.Arn
      ReservedConcurrentExecutions: 1
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt SyncCronDLQ.Arn
      Environment:
        Variables:
          RESULT_TYPE: !Ref ResultType
          LAST_UPDATED_FROM: !Ref CronJobLastUpdatedFrom
          LAST_UPDATED_TO: !Ref CronJobLastUpdatedTo
          SYNC_UTC_DAY: !Ref SyncUtcDay
      Tags:
        Project: PRMS
        Functionality: sync-result
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Enabled: true
            Input: !Sub |
              {
                "job": "sync-cron",
                "env": "${Environment}",
                "orchestrate_bilateral_types": true,
                "limit": ${CronJobLimit},
                "portfolio": "P25"
              }

  SyncApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      # REMOVE RoleName to avoid collisions across stacks/accounts
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SyncApiLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:dev/app/lambdas/prms/result-management/sync*"
      Tags:
        - Key: Project
          Value: PRMS
        - Key: Functionality
          Value: sync-result

  SyncApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-sync-api"
      CodeUri: services/sync/
      Handler: dist/lambda.handler
      Role: !GetAtt SyncApiLambdaRole.Arn
      Runtime: nodejs22.x
      Timeout: 600
      MemorySize: 512
      Environment:
        Variables:
          RESULT_TYPE: !Ref ResultType
      Tags:
        Project: PRMS
        Functionality: sync-result
      Events:
        HttpApiRoot:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        HttpApiProxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  SyncCronFunctionArn:
    Description: ARN of the Sync Cron Lambda function
    Value: !GetAtt SyncCronFunction.Arn
    Export:
      Name: !Sub "${Environment}-sync-cron-arn"

  SyncCronFunctionName:
    Description: Name of the Sync Cron Lambda function
    Value: !Ref SyncCronFunction
    Export:
      Name: !Sub "${Environment}-sync-cron-name"

  SyncCronDLQUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref SyncCronDLQ
    Export:
      Name: !Sub "${Environment}-sync-cron-dlq-url"

  SyncCronSchedule:
    Description: EventBridge Schedule expression
    Value: !Ref ScheduleExpression
    Export:
      Name: !Sub "${Environment}-sync-cron-schedule"

  SyncApiUrl:
    Description: HTTP API base URL for Sync service
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${Environment}-sync-api-url"
